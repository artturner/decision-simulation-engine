[alembic]
# Path to the migration scripts directory, relative to this file.
script_location = alembic

# Prepend services/api/ to sys.path so env.py can do `from app...`.
prepend_sys_path = .

# Template for naming new migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Truncate long slugs in file names.
truncate_slug_length = 40

# --- sqlalchemy.url is intentionally left as a placeholder here.
# env.py overrides it with settings.DATABASE_URL loaded from the
# environment (or a .env file), so credentials are never stored in
# this file.
sqlalchemy.url = postgresql://branching:branching@localhost:5432/branching_scenarios


[post_write_hooks]
# Uncomment to auto-format generated migration files with black:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
